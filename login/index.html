<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with Google</title>
    <link rel="stylesheet" href="../Style/login.css?v=2026-03">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase/config.js?v=2026-05-06-auth2"></script>
    <script src="../supabase/client.js?v=2026-05-06-auth2"></script>
</head>
<body>
    <main>
        <div class="login">
            <h1>Please Log in below</h1>
            <button class="login-button">
                <span>Sign-in with Scioskola</span>
            </button>
        </div>
    </main>

    <script>
      const AUTH_RETURN_TO_STORAGE_KEY = "scioport-auth-return-to";
      const homeUrl = new URL("/index.html", window.location.origin).toString();
      const loginCallbackUrl = new URL("/login/index.html", window.location.origin).toString();

      function getSameOriginReturnUrl(value) {
        if (!value) {
          return "";
        }
        try {
          const url = new URL(value, window.location.href);
          const isLoginPage = /\/login\/(?:index\.html)?$/i.test(url.pathname);
          if (url.origin !== window.location.origin || isLoginPage) {
            return "";
          }
          return url.toString();
        } catch (_error) {
          return "";
        }
      }

      function getPostLoginUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = getSameOriginReturnUrl(urlParams.get("returnTo"));
        if (returnTo) {
          window.sessionStorage.setItem(AUTH_RETURN_TO_STORAGE_KEY, returnTo);
          return returnTo;
        }

        const storedReturnTo = getSameOriginReturnUrl(window.sessionStorage.getItem(AUTH_RETURN_TO_STORAGE_KEY));
        if (storedReturnTo) {
          return storedReturnTo;
        }

        const referrerReturnTo = getSameOriginReturnUrl(document.referrer);
        return referrerReturnTo || homeUrl;
      }

      const postLoginUrl = getPostLoginUrl();

      function getUserEmail(user) {
        return user && user.email ? String(user.email).trim().toLowerCase() : "";
      }

      function isAllowedDomain(email) {
        const domain = String(window.SCIO_ALLOWED_DOMAIN || "scioskola.cz").trim().toLowerCase();
        return Boolean(email) && email.endsWith("@" + domain);
      }

      async function handleSignedInSession(session) {
        const email = getUserEmail(session && session.user ? session.user : null);
        if (!session || !email) {
          return;
        }
        if (!isAllowedDomain(email)) {
          await window.supabaseClient.auth.signOut();
          alert("Prihlas se skolnim uctem na domene " + String(window.SCIO_ALLOWED_DOMAIN || "scioskola.cz") + ".");
          return;
        }
        window.sessionStorage.removeItem(AUTH_RETURN_TO_STORAGE_KEY);
        window.location.href = postLoginUrl;
      }

      function redirectIfSignedIn() {
        if (!window.supabaseClient) {
          return;
        }

        let redirected = false;
        const subscriptionResult = window.supabaseClient.auth.onAuthStateChange(async function (_event, session) {
          if (!session || redirected) {
            return;
          }
          redirected = true;
          await handleSignedInSession(session);
        });

        window.setTimeout(async function () {
          if (redirected) {
            return;
          }
          const { data } = await window.supabaseClient.auth.getSession();
          const session = data && data.session ? data.session : null;
          if (session) {
            redirected = true;
            await handleSignedInSession(session);
          }
          const subscription = subscriptionResult && subscriptionResult.data
            ? subscriptionResult.data.subscription
            : null;
          if (subscription && typeof subscription.unsubscribe === "function") {
            subscription.unsubscribe();
          }
        }, 900);
      }

      document.querySelector(".login-button").onclick = async function () {
        if (!window.supabaseClient) {
          alert("Supabase neni nastaveny. Dopln do supabase/config.js public anon/publishable key, ne sb_secret key.");
          return;
        }
        const { error } = await window.supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: loginCallbackUrl,
            queryParams: {
              prompt: "select_account",
              hd: String(window.SCIO_ALLOWED_DOMAIN || "scioskola.cz").trim().toLowerCase()
            }
          }
        });
        if (error) {
          alert("Login failed: " + error.message);
        }
      };

      redirectIfSignedIn();
    </script>
</body>
</html>
